name: Deploy AeroBoard to GitHub Pages

# Publishes the static web/ folder to GitHub Pages. The whole app runs
# client-side, so this is all the hosting it needs.

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:   # lets you trigger a deploy by hand from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# Only one live deploy at a time; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true   # turn Pages on automatically if it isn't already

      - name: Upload web/ as the site
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
