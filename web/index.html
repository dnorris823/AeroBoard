<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>AeroBoard · GEG</title>
<style>
  html,body{margin:0;height:100%;background:#000;overflow:hidden;}
  body{display:grid;place-items:center;}
  #screen{
    width:min(100vw, calc(100vh * 16 / 9));
    height:auto; aspect-ratio:16/9;
    image-rendering:pixelated; image-rendering:crisp-edges;
    background:#05070d;
  }
</style>
</head>
<body>
<canvas id="screen" width="384" height="216"></canvas>
<script>
(() => {
  const cv = document.getElementById('screen');
  const ctx = cv.getContext('2d');
  const W = 384, H = 216;

  // ---- palette (mirrors render.py) ----
  const C = {
    bg:'#080a10', panel:'#0e141e', panelHi:'#141e2e', line:'#202c40',
    ink:'#e8ecf4', dim:'#7a8aa4', faint:'#4a566c',
    amber:'#ffb24d', green:'#4dff9e', blue:'#5aa9ff', red:'#ff5b5b',
  };
  const TAG = {
    APPROACH:C.amber, DEPARTURE:C.blue, LOW:C.green, GA:'#96d2b4',
    OVERFLIGHT:C.faint, TRANSIT:C.dim, GROUND:C.faint,
  };

  // ---- offline sample (used only if the local server isn't reachable) ----
  const SAMPLE = {
    airport:'GEG', radius_nm:40, source:'sample', error:null, tracking:5,
    counts:{APPROACH:2,DEPARTURE:1,GA:1,OVERFLIGHT:1},
    flights:[
      {label:'SKW5612',type:'E75L',alt_ft:2900,on_ground:false,gs_kt:139,vrate_fpm:-640,distance_nm:2.9,bearing:41,compass:'NE',tag:'APPROACH',visible:true},
      {label:'DAL1853',type:'A320',alt_ft:5400,on_ground:false,gs_kt:216,vrate_fpm:-900,distance_nm:11.1,bearing:47,compass:'NE',tag:'APPROACH',visible:true},
      {label:'N7908L',type:'BE23',alt_ft:3275,on_ground:false,gs_kt:96,vrate_fpm:520,distance_nm:0.9,bearing:135,compass:'SE',tag:'DEPARTURE',visible:true},
      {label:'N738BS',type:'C172',alt_ft:3300,on_ground:false,gs_kt:103,vrate_fpm:0,distance_nm:6.2,bearing:20,compass:'NNE',tag:'GA',visible:true},
      {label:'ACA109',type:'A321',alt_ft:34000,on_ground:false,gs_kt:358,vrate_fpm:0,distance_nm:22,bearing:300,compass:'NW',tag:'OVERFLIGHT',visible:false},
    ],
  };

  let data = null, live = false;

  // ---- primitives ----
  function text(s, x, y, color, size=11, {bold=false, right=false} = {}) {
    ctx.font = `${bold?'bold ':''}${size}px ui-monospace, Menlo, Monaco, Consolas, monospace`;
    ctx.textBaseline = 'top';
    ctx.fillStyle = color;
    ctx.textAlign = right ? 'right' : 'left';
    ctx.fillText(s, x, y);
    ctx.textAlign = 'left';
  }
  function bearingTri(cx, cy, deg, size, color) {
    const a = deg * Math.PI/180, dx=Math.sin(a), dy=-Math.cos(a), px=Math.cos(a), py=Math.sin(a);
    ctx.fillStyle = color; ctx.beginPath();
    ctx.moveTo(cx+dx*size, cy+dy*size);
    ctx.lineTo(cx-dx*size*.7+px*size*.6, cy-dy*size*.7+py*size*.6);
    ctx.lineTo(cx-dx*size*.7-px*size*.6, cy-dy*size*.7-py*size*.6);
    ctx.fill();
  }
  function vtri(x, y, color, up) {
    ctx.fillStyle = color; ctx.beginPath();
    if (up) { ctx.moveTo(x+3,y); ctx.lineTo(x,y+5); ctx.lineTo(x+6,y+5); }
    else    { ctx.moveTo(x,y);   ctx.lineTo(x+6,y); ctx.lineTo(x+3,y+5); }
    ctx.fill();
  }
  function rect(x,y,w,h,c){ ctx.fillStyle=c; ctx.fillRect(x,y,w,h); }
  function clock() {
    const f = new Intl.DateTimeFormat('en-GB', {timeZone:'America/Los_Angeles',
      hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false});
    const p = Object.fromEntries(f.formatToParts(new Date()).map(o=>[o.type,o.value]));
    return {hhmm:`${p.hour}:${p.minute}`, hms:`${p.hour}:${p.minute}:${p.second}`};
  }

  // ---- sections ----
  function header(d){
    rect(0,0,W,15,C.panel); rect(0,15,W,1,C.line);
    text('GEG',4,3,C.amber,12,{bold:true});
    text('SPOKANE INTL',30,4,C.dim,10);
    text(clock().hhmm, W/2-14,3,C.ink,12,{bold:true});
    text(`TRACKING ${d.tracking}`, W-4,4,C.dim,10,{right:true});
  }
  function strip(ac,x,y,w,h){
    const col = TAG[ac.tag]||C.dim;
    if (ac.visible) rect(x,y,w,h-2,C.panelHi);
    rect(x,y,2,h-2,col);
    text(ac.label, x+7, y+1, C.ink, 12, {bold:true});
    text(ac.type||'----', x+74, y+2, C.dim, 11);
    text(ac.tag, x+w-4, y+2, col, 9, {right:true});
    const ly = y+14;
    if (ac.alt_ft !== null) {
      const vr = ac.vrate_fpm||0;
      if (Math.abs(vr) >= 300) vtri(x+7, ly+2, vr>0?C.green:C.amber, vr>0);
      const alt = ac.on_ground ? 'GND' : `${ac.alt_ft.toLocaleString()}FT`;
      text(alt, x+15, ly, C.green, 10);
    }
    if (ac.gs_kt) text(`${ac.gs_kt}KT`, x+78, ly, C.dim, 10);
    text(`${ac.distance_nm}NM`, x+128, ly, C.dim, 10);
    text(ac.compass, x+186, ly, C.ink, 10);
    if (ac.compass) bearingTri(x+212, ly+5, ac.bearing, 4, col);
  }
  function radar(d,x,y,w,h){
    rect(x,y,w,h,'#0a0e16'); ctx.strokeStyle=C.line; ctx.lineWidth=1; ctx.strokeRect(x+.5,y+.5,w-1,h-1);
    text(`RADAR ${d.radius_nm}NM`, x+4, y+3, C.green, 9);
    const cx=x+w/2, cy=y+h/2+5, R=Math.min(w,h)/2-10;
    ctx.strokeStyle='#183428';
    for (const rr of [R, R*2/3, R/3]) { ctx.beginPath(); ctx.arc(cx,cy,rr,0,7); ctx.stroke(); }
    ctx.beginPath(); ctx.moveTo(cx-R,cy); ctx.lineTo(cx+R,cy); ctx.moveTo(cx,cy-R); ctx.lineTo(cx,cy+R); ctx.stroke();
    text('N', cx-2, cy-R-9, C.faint, 8);
    for (const ac of d.flights) {
      if (!ac.distance_nm) continue;
      const rp = Math.min(1, ac.distance_nm/d.radius_nm)*R, a=ac.bearing*Math.PI/180;
      const s = ac.visible?2:1;
      rect(Math.round(cx+rp*Math.sin(a))-1, Math.round(cy-rp*Math.cos(a))-1, s, s, TAG[ac.tag]||C.dim);
    }
    rect(cx-1,cy-1,2,2,C.amber);
  }
  function summary(d,x,y){
    text('IN RANGE', x, y, C.dim, 9);
    let cy=y+12;
    for (const tag of ['APPROACH','DEPARTURE','LOW','GA','OVERFLIGHT']) {
      const n=(d.counts||{})[tag]; if(!n) continue;
      const c=TAG[tag]||C.dim; rect(x,cy+1,5,5,c);
      text(tag.slice(0,4), x+9, cy, C.dim, 9);
      text(String(n), x+52, cy, c, 9, {right:true});
      cy+=11;
    }
  }
  function footer(d){
    const y=H-12; rect(0,y,W,1,C.line);
    if (d.error) text('NO SIGNAL — retrying', 4, y+1, C.red, 9);
    else {
      text(`SRC ${d.source}`, 4, y+1, C.faint, 9);
      text(live?'LIVE':'SAMPLE', 128, y+1, live?C.green:C.amber, 9);
    }
    text(`${clock().hms} PT`, W-4, y+1, C.dim, 9, {right:true});
  }

  function draw(){
    const d = data || SAMPLE;
    rect(0,0,W,H,C.bg);
    header(d);
    const top=18, rowH=25, listX=3, listW=248;
    const maxRows = Math.floor((H-top-14)/rowH);
    if (!d.flights.length && !d.error) text('quiet skies over GEG', listX+8, top+20, C.dim, 12);
    d.flights.slice(0,maxRows).forEach((ac,i)=>strip(ac,listX,top+i*rowH,listW,rowH));
    const rx=256; radar(d, rx, top, W-rx-3, 118); summary(d, rx+3, top+124); footer(d);
  }

  async function poll(){
    try {
      const r = await fetch('/api/flights', {cache:'no-store'});
      if (!r.ok) throw new Error(r.status);
      data = await r.json(); live = true;
    } catch (e) { live = false; if (!data) data = SAMPLE; }
  }

  poll();
  draw();
  setInterval(draw, 1000);   // clock ticks + repaint
  setInterval(poll, 10000);  // refresh traffic
})();
</script>
</body>
</html>
