<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>AeroBoard · GEG</title>

<!-- PWA / iPad "Add to Home Screen": launches full-screen with no Safari chrome. -->
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#05070d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AeroBoard">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=VT323&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;height:100%;background:#000;overflow:hidden;}
  body{display:grid;place-items:center;}
  /* The engine sizes the canvas backing store (384×216 or 512×288); CSS just
     scales it to fill the panel, keeping 16:9 and hard pixel edges. */
  #screen{
    width:min(100vw, calc(100vh * 16 / 9));
    height:auto; aspect-ratio:16/9;
    image-rendering:pixelated; image-rendering:crisp-edges;
    background:#05070d; touch-action:manipulation; cursor:pointer;
  }
</style>
</head>
<body>
<canvas id="screen"></canvas>
<script src="aeroboard-engine.js"></script>
<script src="aeroboard-data.js"></script>
<script>
(() => {
  const cv = document.getElementById('screen');
  const TZ = 'America/Los_Angeles';   // GEG lives in Spokane (Pacific)

  function boot(theme) {
    const app = window.AeroBoard.mount(cv, theme || 'auto', {
      timeZone: TZ,
      onSettings: () => { location.href = 'settings.html'; },
    });

    // Live data: fetch everything client-side (no server). If a fetch fails we
    // keep the last snapshot / built-in sample so the board still renders.
    async function poll() {
      try {
        const d = await window.AeroData.getSnapshot();
        app.setData(d);
      } catch (e) { /* keep last snapshot / the sample */ }
    }
    poll();
    setInterval(poll, 10000);
  }

  // Read the saved look (localStorage), then start. Default to auto time-of-day.
  function start() {
    const s = window.AeroData.loadSettings();
    boot(s.theme || 'auto');
  }

  if (window.AeroBoard) start();
  else addEventListener('load', start);

  // Offline app shell (works only over https / localhost — a no-op elsewhere).
  if ('serviceWorker' in navigator) {
    addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
  }
})();
</script>
</body>
</html>
