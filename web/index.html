<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>AeroBoard · GEG</title>
<link rel="icon" href="data:,">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=VT323&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;height:100%;background:#000;overflow:hidden;}
  body{display:grid;place-items:center;}
  /* The engine sizes the canvas backing store (384×216 or 512×288); CSS just
     scales it to fill the panel, keeping 16:9 and hard pixel edges. */
  #screen{
    width:min(100vw, calc(100vh * 16 / 9));
    height:auto; aspect-ratio:16/9;
    image-rendering:pixelated; image-rendering:crisp-edges;
    background:#05070d; touch-action:manipulation; cursor:pointer;
  }
</style>
</head>
<body>
<canvas id="screen"></canvas>
<script src="/aeroboard-engine.js"></script>
<script>
(() => {
  const cv = document.getElementById('screen');
  const TZ = 'America/Los_Angeles';   // GEG lives in Spokane (Pacific)

  function boot(theme) {
    const app = window.AeroBoard.mount(cv, theme || 'auto', {
      timeZone: TZ,
      onSettings: () => { location.href = '/settings'; },
    });

    // Live data: poll the local server; fall back to the built-in sample if it's
    // unreachable so the board still renders.
    async function poll() {
      try {
        const r = await fetch('/api/flights', { cache: 'no-store' });
        if (!r.ok) throw new Error(r.status);
        const d = await r.json();
        d.live = true;
        app.setData(d);
      } catch (e) { /* keep last snapshot / the sample */ }
    }
    poll();
    setInterval(poll, 10000);
  }

  // Read the saved look, then start. Default to the auto time-of-day theme.
  function start() {
    fetch('/api/settings', { cache: 'no-store' })
      .then(r => r.json())
      .then(s => boot(s.theme || 'auto'))
      .catch(() => boot('auto'));
  }

  if (window.AeroBoard) start();
  else addEventListener('load', start);
})();
</script>
</body>
</html>
